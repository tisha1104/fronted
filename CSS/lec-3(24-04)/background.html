<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .hero{
            height: 400px;
            width: 100%;
            margin: 50px 0px;
        }
        #hero-1{
            background-color: antiquewhite;
        }
        #hero-2{
            background-image: linear-gradient(to bottom,blue,yellow);
        }
        #hero-3{
            background-image: linear-gradient(to top,blue,yellow);
        }
         #hero-4{
            background-image: linear-gradient(to right,blue,yellow);
        }
         #hero-5{
            background-image: linear-gradient(to bottom right,blue,yellow);
        }
         #hero-6{
            background-image: linear-gradient(360deg,blue,yellow);
        }
        #hero-7{
            background-image: linear-gradient(to right,rgba(0, 0, 139, 1) ,rgba(173, 216, 230, 1));
        }
        #hero-8{
            background-image: radial-gradient(red,yellow,green);
        }
        #hero-9{
            background-image: conic-gradient(red,yellow,green)
        }
        #hero-10{
            background-image: linear-gradient(to bottom right ,rgba(0, 0, 139, 1) ,rgba(173, 216, 230, 1));
        }
        #hero-11{
            background-image: linear-gradient(red,yellow,green);
        }
        #hero-12{
            background-image: linear-gradient(to right, red,orange,yellow,green,blue,indigo,violet);
        }
    </style>
</head>
<body>
<div class="hero" id="hero-1"></div>
<div class="hero" id="hero-2"></div>
<div class="hero" id="hero-3"></div>
<div class="hero" id="hero-4"></div>
<div class="hero" id="hero-5"></div>
<div class="hero" id="hero-6"></div>
<div class="hero" id="hero-7"></div>
<div class="hero" id="hero-8"></div>
<div class="hero" id="hero-9"></div>
<div class="hero" id="hero-10"></div>
<div class="hero" id="hero-11"></div>
<div class="hero" id="hero-12"></div>
</body>
</html>
