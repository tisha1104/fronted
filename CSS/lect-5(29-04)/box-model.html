<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .box{
            height: 300px;
            width: 600px;
            border: 5px solid black;
            padding: 50px 100px;
            background-color: palevioletred;
            margin: 50px;
        }
        .card{
            margin: 50px;
            height: 400px;
            width: 300px;
            border: 3px solid black;
            border-radius: 20px;
        }
        .card img{
            height: 200px;
            width: 200px;
            margin-left: auto;
            margin-right: auto;
            display: block;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="box">
        This is box model
    </div>
    <div class="card">
        <img src="two.jpeg" alt="">
        <img src="two.jpeg" alt="">
    </div>
</body>
</html>
