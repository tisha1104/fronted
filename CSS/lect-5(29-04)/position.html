<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            height: 100px;
            background-color: rgb(201, 126, 126);
            position: static;
        }
        .nav{
            background-color: black;
            color: yellow;
            position: sticky;
            top: 0;
            padding: 20px 0px;
            z-index: 1;
        }
        .box-1{
            height: 400px;
            background-color: plum;
            position: relative;
            top: 100px;
            bottom: 100px;
        }
        .inner{
            position: absolute;
            height: 100px;
            width: 200px;
            background-color: blueviolet;
            top: 50%;
            left: 50%;
        }
        .fix-div{
            height: 200px;
            width: 200px;
            background-color: black;
            color: white;
            position: fixed;
            top: 200px;
            right: 10px;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="box">Staic Position Example</div>
    <div class="nav">Navbar</div>
    <div class="box-1">
        <div class="inner">
            This is absolute div
        </div>
    </div>
    <div class="box">Staic Position Example</div>
    <div class="fix-div">
        This Is Fix-div
    </div>
    <div class="box-1">
        <div class="inner">
            This is absolute div
        </div>
    </div>
</body>
</html>
