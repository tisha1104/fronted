<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         #box {
            width: 500px;
            height: 300px;
            border: 2px solid black;
            background-color: rgb(219, 64, 150);
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        p {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="box">
        Click Anywhere Inside This Box
    </div>
    <p id="result">X: 0 | Y: 0</p>

    <script>
        let box=document.getElementById("box");
        let result = document.getElementById("result");

        box.addEventListener("click",function(event){
            result.innerHTML = "X: "+ event.clientX + " | Y: "+ event.clientY;
        });
    </script>
</body>
</html>
