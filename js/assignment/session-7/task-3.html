<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background: #f2f2f2;
            text-align: center;
            padding: 20px;
        }
        button{
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: royalblue;
            color: white;
            border: none;
            border-radius: 5px;
        }
        #playlist{
            margin-top: 20px;
        }
        .card{
            width: 250px;
            margin: 10px auto;
            padding: 15px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.2);
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h2>My Favourite Playlist</h2>
    <button onclick="addsong()">Add Song</button>

    <div id="playlist"></div>
    <script>
    
    let songs=["Tu Chaiye","Tere Naina","Qaafirana","Jaan Nisaar","Tum Mile"];

    function addsong(){
        let randomindex=Math.floor(Math.random()*songs.length);
        let card=document.createElement("div");
        card.className="card";
        card.innerHTML=songs[randomindex];
        document.getElementById("playlist").appendChild(card);
    }
    </script>
</body>
</html>
