<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const  favoriteSongs=["Haareya","Tu hi Haqeeat","Qaafirana","Jaan Nisaar"];
        favoriteSongs.push("Darkhaast");
        console.log(favoriteSongs);
        

            // When an array is declared with const in JavaScript, the variable cannot be reassigned to a new array. However, the contents of the array can still be changed because arrays are mutable.
            // The .push() method adds a new element to the existing array instead of creating a new array. Since the variable still refers to the same array, JavaScript allows this operation.
        
    </script>
</body>
</html>
