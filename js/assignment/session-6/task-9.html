<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         div{
            height: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: static;
        }
        button{
            position: absolute;
            top: 0;
            z-index: 1;
        }
        #btn1-{
            right: 0;
        }
        #btn-2{
            right: 50px;
        }
    </style>
</head>
<body>
    <div id="main">
        <button id="btn-1" onclick="changeTheme('Dark')">Dark</button>
        <button id="btn-2" onclick="changeTheme('light')">Light</button>
        <div class="inner">
            <h1>Welcome!</h1>
            <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Quisquam obcaecati consequuntur vero, eveniet sit inventore magnam culpa odit quasi repellendus facere doloremque. Iste ea temporibus, illum accusamus quo corporis quae.</p>
        </div>
    </div>
    <script>
        function changeTheme(colour){
            let ele=document.getElementById('main');
            if(colour=="Dark"){
                ele.style.backgroundColor="black",
                ele.style.color="white"
            }else{
                ele.style.backgroundColor="white",
                ele.style.color="black"
            }
        }
    </script>
</body>
</html>
