<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* background: linear-gradient(135deg, #667eea, #764ba2); */
            background: pink;
            min-height: 100vh;
        }

        .table-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .table thead {
            background: #343a40;
            color: white;
        }

        .title {
            color: white;
            font-weight: bold;
            text-align: center;
            margin-bottom: 25px;
        }

        .badge-category {
            background-color: #0d6efd;
        }
    </style>
</head>

<body>

    <div class="container py-5">

        <h1 class="title">Product Management</h1>
        <div class="p-5 d-flex gap-3" id="btn"></div>
        <input type="range" id="priceRange" min="0" max="150000" value="150000">
        <h5>Price: ₹<span id="priceValue">150000</span></h5>
        <div class="table-card">
            <table class="table table-hover align-middle mb-0">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Product Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Description</th>
                    </tr>
                </thead>

                <tbody id="pdata">

                </tbody>


            </table>
        </div>

    </div>
    <script>
        const products = [
            {
                id: 1,
                pname: " dell Laptop",
                catname: "Electronics",
                price: 55000,
                description: "A high-performance laptop for work and study."
            },
            {
                id: 2,
                pname: "samsug phone",
                catname: "Electronics",
                price: 25000,
                description: "A modern smartphone with a great camera."
            },
            {
                id: 3,
                pname: "Headphones",
                catname: "Accessories",
                price: 2000,
                description: "Wireless headphones with clear sound quality."
            },
            {
                id: 4,
                pname: "Office Chair",
                catname: "Furniture",
                price: 4500,
                description: "Comfortable chair suitable for office use."
            },
            {
                id: 5,
                pname: "Backpack",
                catname: "Bags",
                price: 1200,
                description: "Durable backpack for daily use and travel."
            },
            {
                id: 6,
                pname: "Water Bottle",
                catname: "Kitchen",
                price: 500,
                description: "Reusable stainless steel water bottle."
            },
            {
                id: 7,
                pname: " hp Laptop",
                catname: "Electronics",
                price: 80000,
                description: "A high-performance laptop for work and study."
            },
            {
                id: 8,
                pname: "iphone17",
                catname: "Electronics",
                price: 150000,
                description: "A modern smartphone with a great camera."
            }
        ];

        function printproduct(products) {
            let str = "";
            products.forEach((item, index) => {
                str += `
                    <tr>
                    <td><strong>${index + 1}</strong></td>
                    <td>${item.pname}</td>
                    <td>
                        <span class="badge badge-category">
                            ${item.catname}
                        </span>
                    </td>
                    <td>₹${item.price}</td>
                    <td>${item.description}</td>
                </tr>`
            })
            document.getElementById('pdata').innerHTML = str
        }

        const catgorey = ["Electronics", "Accessories", "Furniture", "Bags", "Kitchen"];

        function printbutton() {
            let str = `<div class="btn btn-primary" id="btn-all" onclick="filterProductbycname('All')">All</div>`
            catgorey.forEach((item, index) => {
                str += `
                        <div class="btn btn-primary" id="btn-${item}" onclick="filterProductbycname('${item}')">${item}</div>`
            })
            document.getElementById('btn').innerHTML = str;
        }

        function filterProductbycname(catname) {
            let filterProduct;
            if (catname == 'All') {
                filterProduct = products;
            }
            else {
                filterProduct = products.filter((item, index) => {
                    if (item.catname == catname) {
                        return item;
                    }

                })
            }
            printproduct(filterProduct);
        }
        function filterByPrice(price) {
            let filteredProducts = products.filter((item) => {
                return item.price <= price;
            });

            printproduct(filteredProducts);
        }
        const range = document.getElementById("priceRange");

        range.addEventListener("input", function () {
            document.getElementById("priceValue").innerText = this.value;
            filterByPrice(this.value);
        });

        window.onload = function () {
            printproduct(products);
            printbutton()
        }

    </script>
</body>

</html>
