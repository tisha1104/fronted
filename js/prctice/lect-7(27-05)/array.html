<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let fruits = new Array('apple','banana','kiwi');

        console.log(fruits);
        
        let vegs=['potato','tomato','onion'];
        console.log(vegs);
        
        console.log(fruits[0]);
        console.log(fruits.at(0));
        
        console.log(fruits[fruits.length-1]);
        console.log(fruits.at(-1));
        
        //push add element at end of the array
        fruits.push('cheery')
        console.log(fruits);

        //pop remove element at end
        fruits.pop()
        console.log(fruits);

        //unshift add element at start
        fruits.unshift('graps')

        console.log(fruits);

        //shift remove element from strat
        fruits.shift();
        console.log(fruits);
    </script>
</body>
</html>
