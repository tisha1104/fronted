    <script>
        class Test{
            static s;
            #privatedata="test data"
            constructor(x){
                this.x=x;
                console.log(this.#privatedata);
                
            }

            printdata(){
                console.log(`x=${this.x}`);
                console.log(`static data s=${Test.s}`);
                
            }
            //static method
            static printstaticdata(){
                console.log(`static data s=${Test.s}`);
                
            }
        } 
        Test.s=100;

        let t1=new Test(12);
        let t2=new Test(2);
        let t3=new Test(1);
        t1.printdata();
        t2.printdata();
        t3.printdata();
        Test.printstaticdata();
