<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: static;
        }
        button{
            position: absolute;
            top: 0;
            z-index: 1;
        }
        #btn1{
            right: 0;
        }
        #btn2{
            right: 50px;
        }
        .pink{
            background-color: pink;
            color: black;
        }
        .dark{
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>
    <div id="main">
        <button onclick="changeTheme('dark')" id="btn1">Dark</button>
        <button onclick="changeTheme('pink')" id="btn2">pink</button>
        <div class="inner">
            <h1>Welcome to App</h1>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
        </div>
    </div>  

    <script>
        function changeTheme(flag){
            let ele=document.getElementById('main');
            if(flag=='dark'){
                ele.classList.remove('pink')
                ele.classList.add('dark')
            }
            else{
                 ele.classList.remove('dark')
                ele.classList.add('pink')
            }
        }
    </script>
</body>
</html>
