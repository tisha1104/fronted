<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo CRUD App</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f7fc;
        }

        .todo-card {
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .table td,
        .table th {
            vertical-align: middle;
        }
    </style>
</head>

<body>

    <div class="container py-5">

        <!-- Heading -->
        <div class="text-center mb-4">
            <h1 class="fw-bold">Todo CRUD App</h1>
            <p class="text-muted">Bootstrap Todo Design UI</p>
        </div>

        <!-- Todo Form -->
        <div class="card todo-card p-4 mb-5">
            <h3 class="mb-4">Add Todo</h3>

            <form method="post" id="frm1">

                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">Todo Title</label>
                        <input type="text" class="form-control" placeholder="Enter todo title" id="taskname">
                    </div>

                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary" id="btn1">
                        Add Todo
                    </button>

                    <button type="reset" class="btn btn-secondary">
                        Reset
                    </button>
                </div>

            </form>
        </div>

        <!-- Todo List -->
        <div class="card todo-card p-4">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3>Todo List</h3>

                <input type="text" class="form-control w-25" placeholder="Search Todo">
            </div>

            <div class="table-responsive">

                <table class="table table-bordered table-hover">

                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Title</th>
                            <th width="180">Actions</th>
                        </tr>
                    </thead>

                    <tbody id="result">

                        

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let todoarray=[];
        let editId=null;

        document.getElementById('frm1').addEventListener('submit',function(e){
            e.preventDefault();
            let taskname=document.getElementById('taskname').value;

            if(editId==null){
                todoarray.push(taskname);
                console.log(todoarray);
            }
            else{
                console.log(editId);

            todoarray.splice(editId,1,taskname)
            console.log(todoarray);
            document.getElementById('btn1').textContent="Add todo"
            }
            document.getElementById('taskname').value=""
            printTodo();
            editId=null

        })

        function printTodo(){
            let str="";
            for(i=0;i<todoarray.length;i++){
                str+=`
                <tr>
                    <td>${i+1}</td>
                    <td>${todoarray[i]}</td>
                    <td>
                        <button type="button" class="btn btn-success btn-sm" onclick="editTask(${i})">
                                    Edit
                                </button>

                        <button type="button" class="btn btn-danger btn-sm" onclick="delTask(${i})">
                                    Delete
                                </button>
                        </td>
                    </tr>`
                    
            }

            document.getElementById('result').innerHTML=str;
        }

        function delTask(id){
            todoarray.splice(id,1);
            printTodo()
        }
        function editTask(id){
            document.getElementById('btn1').textContent="Update Todo"
            document.getElementById('taskname').value=todoarray[id];
            editId=id;
        }

        window.onload=printTodo();
    </script>

</body>

</html>
