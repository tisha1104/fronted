<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function alertexample(){
            alert("Welcome!")
        }

        function promptexample(){
            let qty=prompt("Enter Qty")
            alert(qty)
        }

        function confirmexample(){
            let res=confirm("Are you Sure You Want to delete!")
            alert(res)
        }
    </script>
</head>
<body>
    <button onclick="alertexample()">Alert Example</button>
    <button onclick="promptexample()">Prompt Example</button>
    <button onclick="confirmexample()">Confirm Example</button>
</body>
</html>
