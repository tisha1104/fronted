<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <legend>Simpale Calulator</legend>
        <label for="">Enter A Number</label>
        <input type="text" name="" id="num1">
        <br>
        <br>
        <label for="">Enter A Number</label>
        <input type="text" name="" id="num2">
        <br>
        <br>
        <input type="button" value="+" onclick="calc('+')">
        <input type="button" value="-" onclick="calc('-')">
        <input type="button" value="*" onclick="calc('*')">
        <input type="button" value="/" onclick="calc('/')">
        <input type="button" value="%" onclick="calc('%')">
        <input type="button" value="**" onclick="calc('**')">

        <br>
        <br>
        <h2 id="result"></h2>
    </fieldset>

    <script>
        function calc(op){
            let num1= +document.getElementById('num1').value;
            let num2= +document.getElementById('num2').value;

            let str=""

            switch(op){
                case '+':
                    str+=`Addition=${num1+num2}`
                    break;
                case '-':
                    str+=`Sub=${num1-num2}`
                    break;
                case '*':
                    str+=`Mul=${num1*num2}`
                    break;
                case '/':
                    str+=`Div=${num1/num2}`
                    break;
                case '%':
                    str+=`Reminder=${num1%num2}`
                    break;
                case '**':
                    str+=`Power=${num1**num2}`
                    break;
                default:
                    str+='Invalid choice';
            }
            document.getElementById('result').innerHTML=str
        }
    </script>
</body>
</html>
