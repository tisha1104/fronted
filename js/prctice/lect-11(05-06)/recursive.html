<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function factfind(num){
            if(num==1){
                return num;
            }
            return num*factfind(num-1)
        }
        console.log(factfind(5));

        // 5*f(4)
        // 5*4*f(3)
        // 5*4*3*f(2)
        // 5*4*3*2*f(1)
        // 1*2*3*4*5    
        
    </script>
</body>
</html>
