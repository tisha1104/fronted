<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function add(...rest){
            sum=0
            for(i=0;i<rest.length;i++){
                sum+=rest[i]
            }
            return sum;
        }

        console.log(add(1,2,3,4,5,6,7,8,9,1,1,224,36,5,7));
        console.log(add(1,2,3,4,5));
        

        function add2(){
            sum=0
            for(i=0;i<arguments.length;i++){
                sum+=arguments[i]
            }
            return sum;
        }

        console.log(add2(1,2,3,4,5,6,7,8,9,1,1,224,36,5,7));
        console.log(add2(1,2,3,4,5));
        
        let numArray=[1,2,345,678,34,0]
        console.log(Math.max(...numArray));
        
        let newarray=[23,11,19,...numArray,100]
        console.log(newarray);

        let user={
            name:"Rani",
            email:"RaniPatel@gmail.com"
        }
        
        let user1={...user,contact:"100101010"};
        console.log(user1);
        
    </script>
</body>
</html>
