<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .main{
            background-color: palevioletred;
            color: black;
            font-size: 4em;
            padding: 100px 200px;
        }
    </style>
</head>
<body>
    <div class="main" id="main"></div>
    <script>
        function printTime(){
            let date=new Date();
        let strTime=`${date.getFullYear()}-${date.getMonth()+1}-${date.getDay()} ${date.getHours()}:${date.getMinutes()}:${date.getSeconds()}`;

        document.getElementById('main').textContent=strTime
        }

        setInterval(printTime,1000)
    </script>
</body>
</html>
