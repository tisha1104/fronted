<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let i,j,k;
        for(i=0;i<=5;i++){
            for(j=0;j<i;j++){
                document.write("*");
            }
            document.write("<br>");
        }
        document.write("<hr>");
        for(i=0;i<=5;i++){
            for(k=4;k>i;k--){
                document.write("&nbsp;&nbsp;");
            }
            for(j=0;j<i;j++){
                document.write("*&nbsp;");
            }
            document.write("<br>");
        }   
        document.write("<hr>");

        for(i=0;i<=5;i++){
            let str=``;
            for(k=4;k>i;k--){
                document.write("&nbsp;&nbsp;");
                str+=``;
            }
            for(j=0;j<i;j++){
                document.write("*&nbsp;");
                str+=`*`
            }
            document.write("<br>");
            console.log(str);
            
        }   
    </script>
</body>
</html>
