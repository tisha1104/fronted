<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        //========================================Number===========================
        let num=1234;
        console.log(num);
        console.log(typeof(num));
        //=============================String==================================
        let name='Tisha';
        console.log(name);
        console.log(typeof(name));
        //=================================Bigint=======================
        let bigint=12373478548757843n;
        console.log(bigint);
        console.log(typeof(bigint));
        //===============================Boolen============================
        let flag=true
        console.log(flag);
        console.log(typeof(flag));
        //=================================Null=============
        let data=null
        console.log(data);
        console.log(typeof(data));
        //==============================Undifen=============
        let userinfo;
        console.log(userinfo);
        console.log(typeof(userinfo));
        //==================================object=======================
        let user={
            name:"Tisha",
            email:"tishapatel@gmail.com"
        }
        console.log(user);
        console.log(typeof(user));
        //========================================Symbol===================
        let id=Symbol('id')
        console.log(id);
        console.log(typeof(id));
        
        
        
        
        
    </script>
</head>
<body>
</body>
</html>
