<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
         <label for="">Enter Number</label>
        <input type="text" name="" id="num">
        <input type="button" value="submit" onclick="printTable()">
        <div id="result">

        </div>
    </fieldset>

    <br>
    <br>
    
    <fieldset>
        <button onclick="findSum()">Sum Find</button>
    </fieldset>
    <script>
        function findSum(){
            let sum=0
            while(true){
                let num=+prompt('Enter a num')
                console.log(num);
                
                if(!num) break;
                sum+=num;
            }
            
            console.log(sum);
            

            
        }
        function printTable(){
            let num=document.getElementById('num').value;

            let str="";
            for(let i=1;i<=10;i++){
                str+=`
                    ${num} X ${i}=${num*i}<br>
                `
            }
            console.log(str);
            document.getElementById('result').innerHTML=str
            
        }
    </script>
</body>
</html>
