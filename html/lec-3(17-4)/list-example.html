<!DOCTYPE html>

<body>
    <h1>List Example</h1>
    <h2>Unorder List</h2>
    <ul>
        <li>Apple</li>
        <li>Kiwi</li>
        <li>Cherry</li>
    </ul>
    <h2>Order List</h2>
    <ol>
        <li>Apple</li>
        <li>Kiwi</li>
        <li>Cherry</li>
    </ol>
    <h2>Description List</h2>
    <dl>
        <dt><b>Data Type:</b></dt>
        <dd>Data Type Define Which Type Of Data User Can Store Such  As a int , float , string etc.</dd>
    </dl>
</body>
