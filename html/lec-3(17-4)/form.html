<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table>
        <form method="post">
            <tr>
                <th>USERNAME:</th>
                <td><input type="text" name="" id="" required></td>
                <th>EMAIL:</th>
                <td><input type="email" name="" id="" required></td>
            </tr>
            <tr>
                <th>Password:</th>
                <td><input type="password" name="" id=""></td>
                <th>DATE OF BIRTH</th>
                <td><input type="date" name="" id=""></td>
            </tr>
            <tr>
                <th>HOBBY:</th>
                <td>
                <input type="checkbox" name="" id="" value="Music">Music
                <input type="checkbox" name="" id="" value="Dance">Dance
                <input type="checkbox" name="" id="" value="Redding">Redding
                </td>
            </tr>
            <th>GENDER:</th>
            <td>
                <input type="radio" name="GENDER" id="" value="Female">Female
                <input type="radio" name="GENDER" id="" value="Male">Male
            </td>
            <tr>
                <td colspan="4" align="center">
                    <input type="submit" value="submit">
                </td>
            </tr>
            <tr>
                <th>ADDRESS</th>
                <td><textarea name="" id=""></textarea></td>
                <th>CITY:</th>
                <td>
                    <select name="" id="">
                        <option value="surat">surat</option>
                        <option value="vadodra">vadodra</option>
                        <option value="ahemdabad">ahemdabad</option>
                        <option value="vapi">vapi</option>
                    </select>
                </td>
            </tr>
        </form>
    </table>
    <h2>Extra input</h2>
    <fieldset>
        <legend>Extra input Example</legend>
        <form method="post">
            <label for="">DATE AND TIME</label>
            <input type="datetime-local" name="" id="">
            <br><br>
            <label for="">COLOUR</label>
            <input type="color" name="" id="">
            <br><br>
            <label for="">FILE</label>
            <input type="file" name="" id="">
            <br><br>
            <label for="">Number</label>
            <input type="number" name="" id="">
        </form>
    </fieldset>
</body>
</html>
