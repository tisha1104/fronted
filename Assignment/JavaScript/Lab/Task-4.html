<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    // Write a JavaScript program to check if a number is positive, negative, or zero using
    // an if-else statement.
    
    let number=0;

    if(number>0){
        console.log(number,"is Positive");
    }else if(number<0){
        console.log(number,"is Negative");        
    }else{
        console.log("The number is zero.");
    }

    // Create a JavaScript program using a switch statement to display the day of the week
    // based on the user input (e.g., 1 for Monday, 2 for Tuesday, etc.)
    console.log("Switch statement to display the day of the week based on the user input (e.g., 1 for Monday, 2 for Tuesday, etc.)");
    
    let dayNumber=4;
    switch(dayNumber){
        case 1:
            console.log("Monday");
            break;
        case 2:
            console.log("Tuesday");
            break;
        case 3:
            console.log("Wednesday");
            break;
        case 4:
            console.log("Thursday");
            break;
        case 5:
            console.log("Friday");
            break;
        case 6:
            console.log("Saturday");
            break;
        case 7:
            console.log("Sunday");
            break;
        default:
            console.log("Invalid day number. Please enter a number between 1 and 7.");            
        }
    </script>
</body>
</html>
