<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Create a JavaScript program to perform the following:
        //Add,subtract, multiply, and divide two numbers using arithmetic operators.
        //Use comparison operators to check if two numbers are equal and if one
        //number is greater than the other.
        //Use logical operators to check if both conditions (e.g., a > 10 and b < 5) are
        //true.

        let num1=11;
        let num2=4;

        // arithmetic operators

        console.log("Add=",num1+num2);
        console.log("Subtract=",num1-num2);
        console.log("Multiply=",num1*num2);
        console.log("Divide=",num1/num2);

        // comparison operators

        console.log("Are the numbers equal=", num1 === num2);
        console.log("Is num1 greater than num2=", num1 > num2);

        // logical operators

        let a = 11;
        let b = 1;

        console.log("Is a > 10 and b < 5=", a > 10 && b < 5);
    </script>
</body>
</html>
